<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario - Recaudo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left"><h1>Inventario</h1></div>
    <nav class="topbar-nav">
      <a href="index.html">Cobro</a>
      <a href="inventario.html" class="active">Inventario</a>
      <a href="reportes.html">Reportes</a>
    </nav>
  </header>

  <main class="page">
    <div class="page-header">
      <h2>Productos</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button id="btnNuevo" class="btn btn-primary">+ Nuevo producto</button>
        <button id="btnExportar" class="btn btn-secondary">Exportar</button>
        <button id="btnImportar" class="btn btn-secondary">Importar</button>
      </div>
    </div>
    <input type="file" id="fileInput" accept=".json" style="display:none">
    <div class="search-bar">
      <input type="text" id="searchInv" placeholder="Buscar producto...">
    </div>
    <table>
      <thead>
        <tr><th>C&oacute;digo</th><th>Nombre</th><th>Categor&iacute;a</th><th>Precio</th><th>Stock</th><th>Tipo</th><th>Acciones</th></tr>
      </thead>
      <tbody id="invBody"></tbody>
    </table>
  </main>

  <div id="modalProducto" class="modal hidden">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <h3 id="modalTitle">Nuevo producto</h3>
      <input type="hidden" id="editId">
      <div class="form-grid">
        <div><label>C&oacute;digo de barras</label><input type="text" id="formCodigo" placeholder="Opcional"></div>
        <div>
          <label>Categor&iacute;a</label>
          <select id="formCategoria">
            <option value="">Sin categor&iacute;a</option>
            <option>Frutas</option><option>Verduras</option><option>Sabritas</option>
            <option>Gamesa</option><option>Bimbo</option><option>Abarrotes</option>
            <option>L&aacute;cteos</option><option>Bebidas</option>
          </select>
        </div>
        <div class="full"><label>Nombre</label><input type="text" id="formNombre" placeholder="Nombre del producto"></div>
        <div><label>Precio (Opcional)</label><input type="number" id="formPrecio" step="0.01" min="0" placeholder="0.00"></div>
        <div><label>Stock</label><input type="number" id="formStock" step="0.001" min="0" value="0"></div>
        <div class="full checkbox-group">
          <input type="checkbox" id="formRequierePeso">
          <label>Requiere peso (frutas/verduras)</label>
        </div>
      </div>
      <div class="modal-buttons">
        <button id="btnGuardar" class="btn btn-primary">Guardar</button>
        <button id="btnCancelar" class="btn btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    function fmt(n) { return '$' + Number(n).toFixed(2); }

    async function cargarTabla(search) {
      const q = search ? '?q=' + encodeURIComponent(search) : '';
      const res = await fetch(API + '/api/productos' + q);
      const lista = await res.json();
      document.getElementById('invBody').innerHTML = lista.map(p => `
        <tr>
          <td data-label="Código">${p.codigo || '-'}</td>
          <td data-label="Nombre"><strong>${p.nombre}</strong></td>
          <td data-label="Categoría">${p.categoria || '-'}</td>
          <td data-label="Precio">${fmt(p.precio)}</td>
          <td data-label="Stock" class="${p.stock <= 5 ? 'stock-bajo' : ''}">${p.requiere_peso ? Number(p.stock).toFixed(3)+' kg' : Number(p.stock).toFixed(0)+' pz'}</td>
          <td data-label="Tipo">${p.requiere_peso ? '<span class="badge">Por peso</span>' : 'Unidad'}</td>
          <td data-label="" class="actions">
            <button class="btn btn-secondary btn-sm" onclick="editar(${p.id})">Editar</button>
            <button class="btn btn-danger btn-sm" onclick="eliminar(${p.id})">Eliminar</button>
          </td>
        </tr>
      `).join('');
    }

    function abrirModal(p) {
      document.getElementById('modalTitle').textContent = p ? 'Editar producto' : 'Nuevo producto';
      document.getElementById('editId').value = p ? p.id : '';
      document.getElementById('formCodigo').value = p ? (p.codigo || '') : '';
      document.getElementById('formNombre').value = p ? p.nombre : '';
      document.getElementById('formCategoria').value = p ? (p.categoria || '') : '';
      document.getElementById('formPrecio').value = p ? p.precio : '';
      document.getElementById('formStock').value = p ? p.stock : '0';
      document.getElementById('formRequierePeso').checked = p ? !!p.requiere_peso : false;
      document.getElementById('modalProducto').classList.remove('hidden');
    }

    async function editar(id) {
      const res = await fetch(API + '/api/productos');
      const prods = await res.json();
      const p = prods.find(x => x.id === id);
      if (p) abrirModal(p);
    }

    async function eliminar(id) {
      if (!confirm('Eliminar este producto?')) return;
      await fetch(API + '/api/productos/' + id, { method: 'DELETE' });
      cargarTabla(document.getElementById('searchInv').value);
    }

    document.getElementById('btnNuevo').addEventListener('click', () => abrirModal(null));

    document.getElementById('btnGuardar').addEventListener('click', async () => {
      const editId = document.getElementById('editId').value;
      const data = {
        codigo: document.getElementById('formCodigo').value || null,
        nombre: document.getElementById('formNombre').value,
        categoria: document.getElementById('formCategoria').value || null,
        precio: parseFloat(document.getElementById('formPrecio').value) || 0,
        requiere_peso: document.getElementById('formRequierePeso').checked,
        stock: parseFloat(document.getElementById('formStock').value) || 0
      };
      if (!data.nombre) { alert('El nombre es obligatorio'); return; }

      let res;
      if (editId) {
        res = await fetch(API + '/api/productos/' + editId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      } else {
        res = await fetch(API + '/api/productos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      }
      const result = await res.json();
      if (!res.ok) { alert(result.error || 'Error al guardar'); return; }

      document.getElementById('modalProducto').classList.add('hidden');
      cargarTabla(document.getElementById('searchInv').value);
    });

    document.getElementById('btnCancelar').addEventListener('click', () => document.getElementById('modalProducto').classList.add('hidden'));
    document.querySelector('.modal-close').addEventListener('click', () => document.getElementById('modalProducto').classList.add('hidden'));
    document.getElementById('searchInv').addEventListener('input', e => cargarTabla(e.target.value));

    document.getElementById('btnExportar').addEventListener('click', async () => {
      const res = await fetch(API + '/api/productos');
      const prods = await res.json();
      const data = JSON.stringify(prods.map(({id, ...rest}) => rest), null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'inventario-' + new Date().toISOString().split('T')[0] + '.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('btnImportar').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });

    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async function(ev) {
        try {
          const data = JSON.parse(ev.target.result);
          if (!Array.isArray(data)) throw new Error('Formato inválido');
          const nombres = data.map(p => (p.nombre || '').trim().toLowerCase()).filter(Boolean);
          const nomDup = nombres.filter((n, i) => nombres.indexOf(n) !== i);
          if (nomDup.length) throw new Error('Nombres duplicados en el archivo: ' + [...new Set(nomDup)].join(', '));
          if (!confirm('Importar ' + data.length + ' productos? Se omitirán los duplicados.')) return;
          const res = await fetch(API + '/api/productos/import', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          const result = await res.json();
          if (!res.ok) throw new Error(result.error);
          cargarTabla(document.getElementById('searchInv').value);
          alert('Importados: ' + result.imported + ' de ' + result.total + ' productos');
        } catch (err) {
          alert('Error al importar: ' + err.message);
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    cargarTabla();
  </script>
</body>
</html>
